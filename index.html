<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesjonalna Wycena</title>

  <!-- SEO / Speed -->
  <meta name="description" content="Szybka i darmowa wycena - sprawdź ofertę już teraz!">

  <!-- Google Ads -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'ID');
  </script>

  <!-- Meta Pixel -->
  <script>
  !function(f,b,e,v,n,t,s){
  if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];
  t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)
  }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

  fbq('init', 'PIXEL_ID');
  fbq('track', 'PageView');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Arial, sans-serif;
    }

    body {
      line-height: 1.5;
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 25px;
      color: #555;
    }

    .btn {
      display: inline-block;
      background: #000;
      color: #fff;
      padding: 14px 28px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .benefits {
      display: grid;
      gap: 20px;
    }

    .benefit {
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .form-section {
      background: #f9f9f9;
      padding: 40px 20px;
      border-radius: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: auto;
    }

    input, textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      background: #000;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }

    @media(min-width: 768px) {
      .hero h1 {
        font-size: 42px;
      }

      .benefits {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero container">
    <h1>Otrzymaj darmową wycenę w 24h</h1>
    <p>Szybko, bez zobowiązań i w pełni profesjonalnie</p>
    <a href="#form" class="btn">Zamów wycenę</a>
  </section>

  <!-- BENEFITS -->
  <section class="section container">
    <h2>Dlaczego my?</h2>
    <div class="benefits">
      <div class="benefit">⚡ Błyskawiczna realizacja</div>
      <div class="benefit">💰 Konkurencyjne ceny</div>
      <div class="benefit">⭐ Sprawdzone opinie klientów</div>
    </div>
  </section>

  <!-- FORM -->
  <section id="form" class="section container">
    <div class="form-section">
      <h2>Poproś o wycenę</h2>

      <form name="kontakt" method="POST" data-netlify="true">
        <input type="text" name="name" placeholder="Imię" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Opisz czego potrzebujesz"></textarea>
        <button type="submit">Wyślij zapytanie</button>
      </form>

    </div>
  </section>

  <footer>
    © 2026 Wszystkie prawa zastrzeżone
  </footer>

</body>
</html>
